<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300" role="img" aria-label="I Am Looking For A JOB">
  <defs>
    <style type="text/css">
      <![CDATA[
      @font-face {
        font-family: "ShrikhandSubset";
        src: url(data:font/woff2;base64,) format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }
      .t { font-family: ShrikhandSubset, Shrikhand, cursive; fill: #ff3d9a; }
      ]]>
    </style>
    <filter id="neonGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1000" height="300" fill="#070714"/>
  <g filter="url(#neonGlow)" opacity="0.95">
    <text class="t" x="500" y="118" text-anchor="middle" font-size="56" letter-spacing="2">I Am Looking For</text>
    <text class="t" x="500" y="238" text-anchor="middle" font-size="72" letter-spacing="4">A JOB!</text>
    <animate attributeName="opacity" values="0.82;1;0.88;0.95;1;0.84;1" keyTimes="0;0.15;0.3;0.45;0.6;0.8;1" dur="3.2s" repeatCount="indefinite"/>
  </g>
  <g>
    <text class="t" x="500" y="118" text-anchor="middle" font-size="56" fill="#ffb8e0" stroke="#ff6eb4" stroke-width="0.6" letter-spacing="2" paint-order="stroke fill">I Am Looking For</text>
    <text class="t" x="500" y="238" text-anchor="middle" font-size="72" fill="#fff5fb" stroke="#ff4da6" stroke-width="0.8" letter-spacing="4" paint-order="stroke fill">A JOB!</text>
    <animate attributeName="opacity" values="0.92;1;0.96;1;0.94;1" keyTimes="0;0.2;0.4;0.55;0.75;1" dur="2.8s" repeatCount="indefinite"/>
  </g>
</svg>